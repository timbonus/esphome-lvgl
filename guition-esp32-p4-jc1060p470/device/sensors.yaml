            id: weather_today_low
            text: !lambda return str_sprintf("%.0f° low", x).c_str();

  - platform: homeassistant
    id: ha_rain_0
    entity_id: sensor.clovelly_rain_chance_0
    internal: true
    on_value:
      then:
        - lvgl.label.update:
