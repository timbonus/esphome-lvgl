text_sensor:

  # UV alert level — BOM returns text: "Low", "Moderate", "High", "Very High", "Extreme"
  # If your integration uses a numeric uv_index instead, switch these to numeric sensor above.
  - platform: homeassistant
    id: ha_uv_0
    entity_id: sensor.clovelly_uv_alert_0
    internal: true
    on_value:
      then:
        - lvgl.label.update:
