binary_sensor:

  # Condensate evaporator switch position
  - platform: homeassistant
    id: condensate_evaporator_switch
    entity_id: switch.condensate_evaporator_switch
    on_state:
      then:
        lvgl.widget.update:
          id: condensate_evaporator_button
          state:
            checked: !lambda return x;

  # Garage door sensor (Z-Wave)
  - platform: homeassistant
    id: garage_door_sensor
    entity_id: binary_sensor.door_window_sensor_gen5
    on_state:
      then:
        - if:
            condition:
              lambda: return x;  # true = open
            then:
              - lvgl.label.update:
                  id: garage_door_icon
                  text_color: 0xFF5252
              - lvgl.label.update:
                  id: garage_door_label
                  text: "Open"
                  text_color: 0xFF5252
            else:
              - lvgl.label.update:
                  id: garage_door_icon
                  text_color: 0x4CAF50
              - lvgl.label.update:
                  id: garage_door_label
                  text: "Closed"
                  text_color: 0x4CAF50

  # Garage smart plug / lights (Zigbee)
  - platform: homeassistant
    id: garage_plug_state
    entity_id: switch.kitchen_plug
    on_state:
      then:
        lvgl.widget.update:
          id: garage_plug_button
          state:
            checked: !lambda return x;

  # Apartment lights (Tapo)
  - platform: homeassistant
    id: bedroom_light_state
    entity_id: light.bedroom_light
    on_state:
      then:
        lvgl.widget.update:
          id: bedroom_light_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: bookcase_lamp_state
    entity_id: light.bookcase_lamp
    on_state:
      then:
        lvgl.widget.update:
          id: bookcase_lamp_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: lounge_light_1_state
    entity_id: light.lounge_room_light
    on_state:
      then:
        lvgl.widget.update:
          id: lounge_light_1_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: lounge_light_2_state
    entity_id: light.lounge_room_light_2
    on_state:
      then:
        lvgl.widget.update:
          id: lounge_light_2_btn
          state:
            checked: !lambda return x;

sensor:

  # Current outdoor temperature (BOM observation station — drives top-bar label)
  - platform: homeassistant
    id: ha_temp
    entity_id: sensor.sydney_observatory_hill_temp
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: temperatures
            text: !lambda |-
              return str_sprintf("%.0f°C", x).c_str();

  # ── Clovelly daily forecast ─────────────────────────────────────────────
  # Entity names follow the same _0/_1/_2 pattern as the confirmed rain_chance sensors.

  - platform: homeassistant
    id: ha_max_0
    entity_id: sensor.clovelly_max_0
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: weather_today_temp
            text: !lambda return str_sprintf("%.0f°", x).c_str();

  - platform: homeassistant
    id: ha_min_0
    entity_id: sensor.clovelly_min_0
    internal: true
    on_value:
      then:
