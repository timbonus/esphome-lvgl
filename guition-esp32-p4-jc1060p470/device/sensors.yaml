    internal: true
    on_value:
      then:
        lvgl.label.update:
          id: hourly_wind_7
          text: !lambda return x.c_str();

  # ── Wind bearing strings — rotate chart arrow widgets ─────────────────────

  - platform: homeassistant
    id: chart_bearing_s0
    entity_id: sensor.clovelly_hour_0_wind_bearing
    internal: true
    on_value:
      then:
        - lambda: |-
            const std::string b = x;
            int16_t a = 0;
            if (b == "NNE") a = 225; else if (b == "NE") a = 450;
            else if (b == "ENE") a = 675; else if (b == "E") a = 900;
            else if (b == "ESE") a = 1125; else if (b == "SE") a = 1350;
            else if (b == "SSE") a = 1575; else if (b == "S") a = 1800;
            else if (b == "SSW") a = 2025; else if (b == "SW") a = 2250;
            else if (b == "WSW") a = 2475; else if (b == "W") a = 2700;
            else if (b == "WNW") a = 2925; else if (b == "NW") a = 3150;
            else if (b == "NNW") a = 3375;
            lv_obj_set_style_transform_angle(id(wind_arrow_0), a, LV_PART_MAIN | LV_STATE_DEFAULT);
            lv_obj_invalidate(id(wind_arrow_0));

