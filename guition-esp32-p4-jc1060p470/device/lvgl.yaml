lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:

      # Current temperature — top left
      - label:
          id: temperatures
          text: "--°C"
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Clock — top centre
      - label:
          id: display_time
          text: "--:--"
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

      # Navigation bar — pinned to bottom of screen
      - obj:
          align: bottom_mid
          width: 100%
          height: 52
          bg_color: 0x1A1A1A
          border_width: 0
          pad_all: 0
          radius: 0
          layout:
            type: flex
            flex_flow: row
          widgets:

            - button:
                id: nav_btn_home
                width: 353
                height: 52
                radius: 0
                bg_color: 0x1A1A1A
                shadow_width: 0
                border_width: 0
                widgets:
                  - label:
                      id: nav_lbl_home
                      text: $nav_home
                      text_font: nav_icon_font
                      align: center
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.page.show: home_page

            - button:
                id: nav_btn_lights
                width: 353
                height: 52
                radius: 0
                bg_color: 0x1A1A1A
                shadow_width: 0
                border_width: 0
                widgets:
                  - label:
                      id: nav_lbl_lights
                      text: $lightbulb
                      text_font: nav_icon_font
                      align: center
                      text_color: 0x666666
                on_click:
                  - lvgl.page.show: lights_page

            - button:
                id: nav_btn_music
                width: 354
                height: 52
                radius: 0
                bg_color: 0x1A1A1A
                shadow_width: 0
                border_width: 0
                widgets:
                  - label:
                      id: nav_lbl_music
                      text: $radio
                      text_font: nav_icon_font
                      align: center
                      text_color: 0x666666
                on_click:
                  - lvgl.page.show: music_page

  pages:

    # ── HOME PAGE ─────────────────────────────────────────────────────────
    - id: home_page
      bg_color: 0x000000
      bg_opa: cover
      pad_top: 42
      pad_bottom: 52
      pad_left: 5
      pad_right: 5
      layout:
        type: flex
        flex_flow: column
        pad_row: 8

      on_load:
        - lvgl.label.update:
            id: nav_lbl_home
            text_color: 0xFFFFFF
        - lvgl.label.update:
            id: nav_lbl_lights
            text_color: 0x666666
        - lvgl.label.update:
            id: nav_lbl_music
            text_color: 0x666666

      widgets:

        # ── Weather forecast (3 day cards) ────────────────────────────────
        - obj:
            width: 100%
            height: 175
            bg_opa: 0
            border_width: 0
            pad_all: 0
            layout:
              type: flex
              flex_flow: row
              pad_column: 7

            widgets:

              # Today
              - obj:
                  width: 344
                  height: 175
                  bg_color: 0x0D2137
                  border_color: 0x1A4060
                  border_width: 1
                  radius: 8
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  on_click:
                    - lvgl.page.show: weather_page
                  widgets:
                    - label:
                        text: "TODAY"
                        text_font: clockbar_font
                        text_color: 0x6BAED6
                    - label:
                        id: weather_today_temp
                        text: "--°"
                        text_font: statistics_font
                        text_color: 0xFFFFFF
                    - label:
                        id: weather_today_low
                        text: "-- ° low"
                        text_font: label_font
                        text_color: 0x888888
                    - label:
                        id: weather_today_rain
                        text: "-- % rain"
                        text_font: clockbar_font
                        text_color: 0x90CAF9
                    - label:
                        id: weather_today_uv
                        text: "UV: --"
                        text_font: clockbar_font
                        text_color: 0xFFA726

              # Tomorrow
              - obj:
                  width: 344
                  height: 175
                  bg_color: 0x12122A
                  border_color: 0x2A2A55
                  border_width: 1
                  radius: 8
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  on_click:
                    - lvgl.page.show: weather_page
                  widgets:
                    - label:
                        id: weather_tomorrow_name
                        text: "---"
                        text_font: clockbar_font
                        text_color: 0x9E9EBF
                    - label:
                        id: weather_tomorrow_temp
                        text: "--°"
                        text_font: statistics_font
                        text_color: 0xFFFFFF
                    - label:
                        id: weather_tomorrow_low
                        text: "-- ° low"
                        text_font: label_font
                        text_color: 0x888888
                    - label:
                        id: weather_tomorrow_rain
                        text: "-- % rain"
                        text_font: clockbar_font
                        text_color: 0x90CAF9
                    - label:
                        id: weather_tomorrow_uv
                        text: "UV: --"
                        text_font: clockbar_font
                        text_color: 0xFFA726

              # Day after tomorrow
              - obj:
                  width: 344
                  height: 175
                  bg_color: 0x12122A
                  border_color: 0x2A2A55
                  border_width: 1
                  radius: 8
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  on_click:
                    - lvgl.page.show: weather_page
                  widgets:
                    - label:
                        id: weather_day2_name
                        text: "---"
                        text_font: clockbar_font
                        text_color: 0x9E9EBF
                    - label:
                        id: weather_day2_temp
                        text: "--°"
                        text_font: statistics_font
                        text_color: 0xFFFFFF
                    - label:
                        id: weather_day2_low
                        text: "-- ° low"
                        text_font: label_font
                        text_color: 0x888888
                    - label:
                        id: weather_day2_rain
                        text: "-- % rain"
                        text_font: clockbar_font
                        text_color: 0x90CAF9
                    - label:
                        id: weather_day2_uv
                        text: "UV: --"
                        text_font: clockbar_font
                        text_color: 0xFFA726

        # ── Hourly forecast strip (8 slots × 2 h) ────────────────────────
        - obj:
            width: 100%
            height: 85
            bg_color: 0x111111
            border_color: 0x222222
            border_width: 1
            radius: 8
            pad_all: 4
            layout:
              type: flex
              flex_flow: row
              pad_column: 4

            widgets:

              - obj:
                  flex_grow: 1
                  height: 75
                  bg_opa: 0
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
                        id: hourly_time_0
                        text: "--:--"
                        text_font: clockbar_font
                        text_color: 0x888888
                    - label:
                        id: hourly_temp_0
                        text: "--°"
                        text_font: label_font
                        text_color: 0xFFFFFF
                    - label:
                        id: hourly_wind_0
                        text: "--"
                        text_font: clockbar_font
                        text_color: 0x90CAF9

              - obj:
                  flex_grow: 1
                  height: 75
                  bg_opa: 0
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
                        id: hourly_time_1
                        text: "--:--"
                        text_font: clockbar_font
                        text_color: 0x888888
                    - label:
                        id: hourly_temp_1
                        text: "--°"
                        text_font: label_font
                        text_color: 0xFFFFFF
                    - label:
                        id: hourly_wind_1
                        text: "--"
                        text_font: clockbar_font
                        text_color: 0x90CAF9

              - obj:
                  flex_grow: 1
                  height: 75
                  bg_opa: 0
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
                        id: hourly_time_2
                        text: "--:--"
                        text_font: clockbar_font
                        text_color: 0x888888
                    - label:
                        id: hourly_temp_2
                        text: "--°"
                        text_font: label_font
                        text_color: 0xFFFFFF
                    - label:
                        id: hourly_wind_2
                        text: "--"
                        text_font: clockbar_font
                        text_color: 0x90CAF9

              - obj:
                  flex_grow: 1
                  height: 75
                  bg_opa: 0
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
