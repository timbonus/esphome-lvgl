                        text_color: 0x888888
                    - label:
                        id: hourly_temp_3
                        text: "--°"
                        text_font: label_font
                        text_color: 0xFFFFFF
                    - label:
                        id: hourly_wind_3
                        text: "--"
                        text_font: clockbar_font
                        text_color: 0x90CAF9

              - obj:
