                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
                        id: hourly_time_5
                        text: "--:--"
                        text_font: clockbar_font
                        text_color: 0x888888
                    - label:
                        id: hourly_temp_5
                        text: "--°"
                        text_font: label_font
                        text_color: 0xFFFFFF
                    - label:
                        id: hourly_wind_5
                        text: "--"
                        text_font: clockbar_font
                        text_color: 0x90CAF9

              - obj:
                  flex_grow: 1
                  height: 75
                  bg_opa: 0
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
                        id: hourly_time_6
                        text: "--:--"
                        text_font: clockbar_font
                        text_color: 0x888888
                    - label:
                        id: hourly_temp_6
                        text: "--°"
                        text_font: label_font
                        text_color: 0xFFFFFF
                    - label:
                        id: hourly_wind_6
                        text: "--"
                        text_font: clockbar_font
                        text_color: 0x90CAF9

              - obj:
                  flex_grow: 1
                  height: 75
                  bg_opa: 0
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
                        id: hourly_time_7
                        text: "--:--"
                        text_font: clockbar_font
                        text_color: 0x888888
                    - label:
                        id: hourly_temp_7
                        text: "--°"
                        text_font: label_font
                        text_color: 0xFFFFFF
                    - label:
                        id: hourly_wind_7
                        text: "--"
                        text_font: clockbar_font
                        text_color: 0x90CAF9

        # ── Garage row ────────────────────────────────────────────────────
        - obj:
            width: 100%
            height: 150
            bg_opa: 0
            border_width: 0
            pad_all: 0
            layout:
              type: flex
              flex_flow: row
              pad_column: 7

            widgets:

              # Door status panel
              - obj:
                  width: 300
                  height: 150
                  bg_color: 0x1E1E1E
                  border_color: 0x333333
                  border_width: 1
                  radius: 8
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    flex_align_main: space_evenly
                  widgets:
                    - label:
                        text: "GARAGE DOOR"
                        text_font: clockbar_font
                        text_color: 0x888888
                    - label:
                        id: garage_door_icon
                        text: $garage_icon
                        text_font: icon_font
                        text_color: 0x4CAF50
                    - label:
                        id: garage_door_label
                        text: "Closed"
                        text_font: clockbar_font
                        text_color: 0x4CAF50

              # Garage smart plug toggle
              - button:
                  id: garage_plug_button
                  width: 300
                  height: 150
                  checkable: true
                  styles: control
                  radius: 8
                  widgets:
                    - label:
                        text_font: icon_font
                        align: top_left
                        text: $plug_on
                    - label:
                        align: bottom_left
                        text: "Garage lights"
                  on_click:
                    - homeassistant.service:
                        service: switch.toggle
                        data:
                          entity_id: switch.kitchen_plug

    # ── LIGHTS PAGE ───────────────────────────────────────────────────────
    - id: lights_page
      bg_color: 0x000000
      bg_opa: cover
      pad_top: 47
      pad_bottom: 57
      pad_left: 5
      pad_right: 5
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 8
        pad_column: 8

      on_load:
        - lvgl.label.update:
            id: nav_lbl_home
            text_color: 0x666666
        - lvgl.label.update:
            id: nav_lbl_lights
            text_color: 0xFFFFFF
        - lvgl.label.update:
            id: nav_lbl_music
            text_color: 0x666666

      widgets:

        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: bedroom_light_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $nightlight
              - label:
                  align: bottom_left
                  text: "Bedroom"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.bedroom_light

        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: bookcase_lamp_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Bookcase"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.bookcase_lamp

        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lounge_light_1_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Lounge"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.lounge_room_light

        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lounge_light_2_btn
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Lounge 2"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.lounge_room_light_2

        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: condensate_evaporator_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $aircon
              - label:
                  align: bottom_left
                  text: "Condensate evap."
            on_click:
              - homeassistant.service:
                  service: script.toggle_condensate_evaporator

    # ── MUSIC PAGE ────────────────────────────────────────────────────────
    - id: music_page
      bg_color: 0x000000
      bg_opa: cover
      pad_top: 47
      pad_bottom: 57
      pad_left: 10
      pad_right: 10

      on_load:
        - lvgl.label.update:
            id: nav_lbl_home
            text_color: 0x666666
        - lvgl.label.update:
            id: nav_lbl_lights
            text_color: 0x666666
        - lvgl.label.update:
            id: nav_lbl_music
            text_color: 0xFFFFFF

      widgets:
        - label:
            align: center
            text: "Music / radio coming soon"
            text_font: label_font
            text_color: 0x555555

    # ── WEATHER DETAIL PAGE ───────────────────────────────────────────────
    - id: weather_page
      bg_color: 0x000000
      bg_opa: cover
      pad_top: 42
      pad_bottom: 52
      pad_left: 5
      pad_right: 5
      layout:
        type: flex
        flex_flow: column
        pad_row: 4

      on_load:
        - lvgl.label.update:
            id: nav_lbl_home
            text_color: 0xFFFFFF
        - lvgl.label.update:
            id: nav_lbl_lights
            text_color: 0x666666
        - lvgl.label.update:
            id: nav_lbl_music
            text_color: 0x666666

      widgets:

        # Page title
        - label:
            text: "WEATHER DETAIL"
            text_font: clockbar_font
            text_color: 0x6BAED6
            width: 100%
            text_align: center

        # Temperature line chart (°C over next 14 h)
        - chart:
            id: weather_temp_chart
            width: 100%
            height: 160
            chart_type: line
            min_value: 0
            max_value: 40
            point_count: 8
            update_mode: circular
            bg_color: 0x111111
            bg_opa: 255
            border_color: 0x333333
            border_width: 1
            radius: 6
            pad_all: 0
            series:
              - color: 0xFF7043
                id: weather_temp_series

        # Wind speed bar chart (km/h)
        - chart:
            id: weather_wind_chart
            width: 100%
            height: 96
            chart_type: bar
            min_value: 0
            max_value: 60
            point_count: 8
            update_mode: circular
            bg_color: 0x111111
            bg_opa: 255
            border_color: 0x333333
            border_width: 1
            radius: 6
            pad_all: 0
            series:
              - color: 0x4FC3F7
                id: weather_wind_series

        # Wind direction arrows — one per slot, rotated via transform_angle
        - obj:
            width: 100%
            height: 50
            bg_opa: 0
            border_width: 0
            pad_all: 0
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_between
              flex_align_cross: center
            widgets:
              - label:
                  id: wind_arrow_0
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center
              - label:
                  id: wind_arrow_1
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center
              - label:
                  id: wind_arrow_2
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center
              - label:
                  id: wind_arrow_3
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center
              - label:
                  id: wind_arrow_4
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center
              - label:
                  id: wind_arrow_5
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center
              - label:
                  id: wind_arrow_6
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center
              - label:
                  id: wind_arrow_7
                  text: "\U000F005D"
                  text_font: arrow_font
                  text_color: 0x4FC3F7
                  width: 36
                  height: 36
                  text_align: center

        # Time labels — aligned with chart columns
        - obj:
            width: 100%
            height: 24
            bg_opa: 0
            border_width: 0
            pad_all: 0
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_between
              flex_align_cross: center
            widgets:
              - label:
                  id: chart_time_0
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
              - label:
                  id: chart_time_1
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
              - label:
                  id: chart_time_2
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
              - label:
                  id: chart_time_3
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
              - label:
                  id: chart_time_4
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
              - label:
                  id: chart_time_5
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
              - label:
                  id: chart_time_6
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
              - label:
                  id: chart_time_7
                  text: "--:--"
                  text_font: clockbar_font
                  text_color: 0x888888
                  width: 60
                  text_align: center
